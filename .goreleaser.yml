# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: lenos

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
  license: "FSL-1.1-MIT"
  homepage: "https://github.com/tta-lab/lenos"
  description: "A terminal-first AI assistant and interactive runtime for the ttal ecosystem."
  full_description: "Lenos is a bash-only interactive shell for ttal agents — multi-model, session-based, built on the Charm ecosystem."
  maintainers:
    - "tta-lab <team@tta-lab.com>"

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

before:
  hooks:
    - go mod tidy
    - rm -rf completions
    - mkdir completions
    - rm -rf manpages
    - mkdir manpages
    - sh -c 'go run . completion bash >./completions/lenos.bash'
    - sh -c 'go run . completion zsh >./completions/lenos.zsh'
    - sh -c 'go run . completion fish >./completions/lenos.fish'
    - sh -c 'go run . man | gzip -c >./manpages/lenos.1.gz'

builds:
  - id: lenos
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/tta-lab/lenos/internal/version.Version={{.Version}}
  - id: narrate
    main: ./cmd/narrate
    binary: narrate
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: >-
      lenos_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - completions/*
      - manpages/*
      - LICENSE*
      - README*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"

brews:
  - name: lenos
    commit_author:
      name: tta-lab-bot
      email: bot@tta-lab.com
    commit_msg_template: "feat(formula): update {{ .ProjectName }} to {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/tta-lab/lenos"
    description: "A terminal-first AI assistant and interactive runtime for the ttal ecosystem"
    license: "FSL-1.1-MIT"
    install: |
      bin.install "lenos"
      bin.install "narrate"
      bash_completion.install "completions/lenos.bash" => "lenos"
      zsh_completion.install "completions/lenos.zsh" => "_lenos"
      fish_completion.install "completions/lenos.fish"
      man1.install "manpages/lenos.1.gz"
    test: |
      system "#{bin}/lenos", "--version"
    repository:
      owner: tta-lab
      name: homebrew-ttal
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

nfpms:
  - id: packages
    package_name: lenos
    file_name_template: "lenos_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: "https://github.com/tta-lab/lenos"
    maintainer: "tta-lab <team@tta-lab.com>"
    description: "A terminal-first AI assistant and interactive runtime for the ttal ecosystem"
    license: "FSL-1.1-MIT"
    formats:
      - deb
      - rpm
    contents:
      - src: ./completions/lenos.bash
        dst: /usr/share/bash-completion/completions/lenos
      - src: ./completions/lenos.zsh
        dst: /usr/share/zsh/site-functions/_lenos
      - src: ./completions/lenos.fish
        dst: /usr/share/fish/vendor_completions.d/lenos.fish
      - src: ./manpages/lenos.1.gz
        dst: /usr/share/man/man1/lenos.1.gz
