basePath: /v1
definitions:
  catwalk.Model:
    properties:
      can_reason:
        type: boolean
      context_window:
        type: integer
      cost_per_1m_in:
        type: number
      cost_per_1m_in_cached:
        type: number
      cost_per_1m_out:
        type: number
      cost_per_1m_out_cached:
        type: number
      default_max_tokens:
        type: integer
      default_reasoning_effort:
        type: string
      id:
        type: string
      name:
        type: string
      options:
        $ref: '#/definitions/catwalk.ModelOptions'
      reasoning_levels:
        items:
          type: string
        type: array
      supports_attachments:
        type: boolean
    type: object
  catwalk.ModelOptions:
    properties:
      frequency_penalty:
        type: number
      presence_penalty:
        type: number
      provider_options:
        additionalProperties: {}
        type: object
      temperature:
        type: number
      top_k:
        type: integer
      top_p:
        type: number
    type: object
  config.Attribution:
    properties:
      co_authored_by:
        type: boolean
      generated_with:
        type: boolean
      trailer_style:
        $ref: '#/definitions/config.TrailerStyle'
    type: object
  config.Completions:
    properties:
      max_depth:
        type: integer
      max_items:
        type: integer
    type: object
  config.Permissions:
    properties:
      allowed_tools:
        items:
          type: string
        type: array
    type: object
  config.SelectedModel:
    properties:
      frequency_penalty:
        type: number
      max_tokens:
        description: Overrides the default model configuration.
        type: integer
      model:
        description: |-
          The model id as used by the provider API.
          Required.
        type: string
      presence_penalty:
        type: number
      provider:
        description: |-
          The model provider, same as the key/id used in the providers config.
          Required.
        type: string
      provider_options:
        additionalProperties: {}
        description: Override provider specific options.
        type: object
      reasoning_effort:
        description: Only used by models that use the openai provider and need this
          set.
        type: string
      temperature:
        type: number
      think:
        description: Used by anthropic models that can reason to indicate if the model
          should think.
        type: boolean
      top_k:
        type: integer
      top_p:
        type: number
    type: object
  config.SelectedModelType:
    enum:
    - large
    - small
    type: string
    x-enum-varnames:
    - SelectedModelTypeLarge
    - SelectedModelTypeSmall
  config.TUIOptions:
    properties:
        type: boolean
      completions:
        $ref: '#/definitions/config.Completions'
      diff_mode:
        type: string
      show_thinking:
        type: boolean
      transparent:
        type: boolean
    type: object
  config.ToolGrep:
    properties:
      timeout:
        $ref: '#/definitions/time.Duration'
    type: object
  config.ToolLs:
    properties:
      max_depth:
        type: integer
      max_items:
        type: integer
    type: object
  config.Tools:
    properties:
      grep:
        $ref: '#/definitions/config.ToolGrep'
      ls:
        $ref: '#/definitions/config.ToolLs'
    type: object
  config.TrailerStyle:
    enum:
    - none
    - co-authored-by
    - assisted-by
    type: string
    x-enum-varnames:
    - TrailerStyleNone
    - TrailerStyleCoAuthoredBy
    - TrailerStyleAssistedBy
  csync.Map-string-config_ProviderConfig:
    type: object
  github_com_tta-lab_lenos_internal_config.Config:
    properties:
      $schema:
        type: string
      models:
        additionalProperties:
          $ref: '#/definitions/config.SelectedModel'
        description: We currently only support large/small as values here.
        type: object
      options:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Options'
      permissions:
        $ref: '#/definitions/config.Permissions'
      providers:
        allOf:
        - $ref: '#/definitions/csync.Map-string-config_ProviderConfig'
        description: The providers that are configured
      recent_models:
        additionalProperties:
          items:
            $ref: '#/definitions/config.SelectedModel'
          type: array
        description: Recently used models stored in the data directory config.
        type: object
      tools:
        $ref: '#/definitions/config.Tools'
    type: object
  github_com_tta-lab_lenos_internal_config.Options:
    properties:
      agent_paths:
        items:
          type: string
        type: array
      attribution:
        $ref: '#/definitions/config.Attribution'
      context_paths:
        items:
          type: string
        type: array
      data_directory:
        description: Relative to the cwd
        type: string
      debug:
        type: boolean
      disable_auto_summarize:
        type: boolean
      disable_default_providers:
        type: boolean
      disable_metrics:
        type: boolean
      disable_notifications:
        type: boolean
      disable_provider_auto_update:
        type: boolean
      disabled_tools:
        items:
          type: string
        type: array
      initialize_as:
        type: string
      progress:
        type: boolean
      sandbox:
        type: boolean
      tui:
        $ref: '#/definitions/config.TUIOptions'
    type: object
  github_com_tta-lab_lenos_internal_config.Scope:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - ScopeGlobal
    - ScopeWorkspace
  github_com_tta-lab_lenos_internal_proto.Message:
    properties:
      created_at:
        type: integer
      id:
        type: string
      model:
        type: string
      parts:
        items: {}
        type: array
      provider:
        type: string
      role:
        $ref: '#/definitions/proto.MessageRole'
      session_id:
        type: string
      updated_at:
        type: integer
    type: object
  proto.AgentInfo:
    properties:
      is_busy:
        type: boolean
      is_ready:
        type: boolean
      model:
        $ref: '#/definitions/catwalk.Model'
      model_cfg:
        $ref: '#/definitions/config.SelectedModel'
    type: object
  proto.AgentMessage:
    properties:
      attachments:
        items:
          $ref: '#/definitions/proto.Attachment'
        type: array
      prompt:
        type: string
      session_id:
        type: string
    type: object
  proto.AgentSession:
    properties:
      completion_tokens:
        type: integer
      cost:
        type: number
      created_at:
        type: integer
      id:
        type: string
      is_busy:
        type: boolean
      message_count:
        type: integer
      parent_session_id:
        type: string
      prompt_tokens:
        type: integer
      summary_message_id:
        type: string
      title:
        type: string
      updated_at:
        type: integer
    type: object
  proto.Attachment:
    properties:
      content:
        items:
          type: integer
        type: array
      file_name:
        type: string
      file_path:
        type: string
      mime_type:
        type: string
    type: object
  proto.ConfigModelRequest:
    properties:
      model:
        $ref: '#/definitions/config.SelectedModel'
      model_type:
        $ref: '#/definitions/config.SelectedModelType'
      scope:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Scope'
    type: object
  proto.ConfigProviderKeyRequest:
    properties:
      api_key: {}
      provider_id:
        type: string
      scope:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Scope'
    type: object
  proto.ConfigRefreshOAuthRequest:
    properties:
      provider_id:
        type: string
      scope:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Scope'
    type: object
  proto.ConfigRemoveRequest:
    properties:
      key:
        type: string
      scope:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Scope'
    type: object
  proto.ConfigSetRequest:
    properties:
      key:
        type: string
      scope:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Scope'
      value: {}
    type: object
  proto.Error:
    properties:
      message:
        type: string
    type: object
  proto.ImportCopilotResponse:
    properties:
      success:
        type: boolean
      token: {}
    type: object
  proto.MessageRole:
    enum:
    - assistant
    - user
    - system
    - tool
    type: string
    x-enum-varnames:
    - Assistant
    - User
    - System
    - Tool
  proto.ProjectInitPromptResponse:
    properties:
      prompt:
        type: string
    type: object
  proto.ProjectNeedsInitResponse:
    properties:
      needs_init:
        type: boolean
    type: object
  proto.ServerControl:
    properties:
      command:
        type: string
    type: object
  proto.Session:
    properties:
      completion_tokens:
        type: integer
      cost:
        type: number
      created_at:
        type: integer
      id:
        type: string
      message_count:
        type: integer
      parent_session_id:
        type: string
      prompt_tokens:
        type: integer
      summary_message_id:
        type: string
      title:
        type: string
      updated_at:
        type: integer
    type: object
  proto.VersionInfo:
    properties:
      commit:
        type: string
      go_version:
        type: string
      platform:
        type: string
      version:
        type: string
    type: object
  proto.Workspace:
    properties:
      config:
        $ref: '#/definitions/github_com_tta-lab_lenos_internal_config.Config'
      data_dir:
        type: string
      debug:
        type: boolean
      env:
        items:
          type: string
        type: array
      id:
        type: string
      path:
        type: string
      version:
        type: string
    type: object
  time.Duration:
    enum:
    - -9223372036854775808
    - 9223372036854775807
    - 1
    - 1000
    - 1000000
    - 1000000000
    - 60000000000
    - 3600000000000
    format: int64
    type: integer
    x-enum-varnames:
    - minDuration
    - maxDuration
    - Nanosecond
    - Microsecond
    - Millisecond
    - Second
    - Minute
    - Hour
info:
  contact:
    name: tta-lab
    url: https://github.com/tta-lab/lenos
  description: Lenos is a terminal-based AI coding assistant and interactive runtime
    for the ttal ecosystem. This API is served over a Unix socket (or Windows named
    pipe) and provides programmatic access to workspaces, sessions, agents, and more.
  license:
    name: FSL-1.1-MIT
    url: https://github.com/tta-lab/lenos/blob/main/LICENSE.md
  title: Lenos API
  version: "1.0"
paths:
  /config:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: Get server config
      tags:
      - system
  /control:
    post:
      consumes:
      - application/json
      parameters:
      - description: Control command (e.g. shutdown)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.ServerControl'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Send server control command
      tags:
      - system
  /health:
    get:
      responses:
        "200":
          description: OK
      summary: Health check
      tags:
      - system
  /version:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proto.VersionInfo'
      summary: Get server version
      tags:
      - system
  /workspaces:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/proto.Workspace'
            type: array
      summary: List workspaces
      tags:
      - workspaces
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace creation params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.Workspace'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proto.Workspace'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Create workspace
      tags:
      - workspaces
  /workspaces/{id}:
    delete:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Delete workspace
      tags:
      - workspaces
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proto.Workspace'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Get workspace
      tags:
      - workspaces
  /workspaces/{id}/agent:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proto.AgentInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Agent message
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.AgentMessage'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Send message to agent
      tags:
      - agent
  /workspaces/{id}/agent/default-small-model:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Provider ID
        in: query
        name: provider_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Get default small model
      tags:
      - agent
  /workspaces/{id}/agent/init:
    post:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Initialize agent
      tags:
      - agent
  /workspaces/{id}/agent/sessions/{sid}:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        in: path
        name: sid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proto.AgentSession'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Get agent session
      tags:
      - agent
  /workspaces/{id}/agent/sessions/{sid}/cancel:
    post:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        in: path
        name: sid
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Cancel agent session
      tags:
      - agent
  /workspaces/{id}/agent/sessions/{sid}/prompts/clear:
    post:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        in: path
        name: sid
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Clear prompt queue
      tags:
      - agent
  /workspaces/{id}/agent/sessions/{sid}/prompts/list:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        in: path
        name: sid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: List queued prompts
      tags:
      - agent
  /workspaces/{id}/agent/sessions/{sid}/prompts/queued:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        in: path
        name: sid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Get queued prompt status
      tags:
      - agent
  /workspaces/{id}/agent/sessions/{sid}/summarize:
    post:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Session ID
        in: path
        name: sid
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Summarize session
      tags:
      - agent
  /workspaces/{id}/agent/update:
    post:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Update agent
      tags:
      - agent
  /workspaces/{id}/config:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Get workspace config
      tags:
      - workspaces
  /workspaces/{id}/config/import-copilot:
    post:
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proto.ImportCopilotResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Import Copilot credentials
      tags:
      - config
  /workspaces/{id}/config/model:
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Config model request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.ConfigModelRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Set the preferred model
      tags:
      - config
  /workspaces/{id}/config/provider-key:
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Config provider key request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.ConfigProviderKeyRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Set provider API key
      tags:
      - config
  /workspaces/{id}/config/refresh-oauth:
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Refresh OAuth request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.ConfigRefreshOAuthRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/proto.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/proto.Error'
      summary: Refresh OAuth token
      tags:
      - config
  /workspaces/{id}/config/remove:
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: Config remove request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/proto.ConfigRemoveRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/proto.Error'
        "404":
          description: Not Found
