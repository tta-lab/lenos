name: lint
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10
          skip-build-cache: true
          args: --timeout 10m
